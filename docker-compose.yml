services:
  db:
    image: postgres:16-alpine
    container_name: sports_ecom_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shoes_ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-shoes_ecommerce}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sports_ecom_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-5000}
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://postgres:postgres@db:5432/shoes_ecommerce}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      TS_NODE_DEV: "true"
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    volumes:
      - uploads_data:/app/uploads
    command: sh -c "npx prisma migrate deploy && npm run dev"

volumes:
  postgres_data:
  uploads_data:
